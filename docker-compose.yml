services:
  postgres:
    image: postgres:16.2
    container_name: bda-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
      - "./paysim dataset.csv:/data/paysim.csv"

volumes:
  pgdata:
